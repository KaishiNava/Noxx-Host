<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noxx Hostt - Order Processing Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/html/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #02040a;
            --panel-glass: rgba(10, 15, 30, 0.75);
            --neon-cyan: #00f2fe;
            --neon-orange: #ff758c;
            --neon-green: #05ec8c;
            --blur-radius: 20px;
        }

        body {
            background-color: var(--bg-deep);
            color: #f3f4f6;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.01) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        h1, h2, h3, h4, h5, .font-space {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Ambient Background Blur */
        .ambient-blur {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 117, 140, 0.08) 0%, rgba(0,0,0,0) 70%);
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            z-index: -1;
            pointer-events: none;
        }

        /* Central Glass Card Container */
        .notify-container {
            background: var(--panel-glass);
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 28px;
            padding: 45px 35px;
            max-width: 650px;
            margin: 60px auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Tracking Flow Steps */
        .tracking-wrapper {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin: 35px 0;
        }
        .tracking-wrapper::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: rgba(255, 255, 255, 0.08);
            z-index: 1;
        }
        .tracking-line-active {
            position: absolute;
            top: 20px;
            left: 10%;
            width: 40%; /* Menandakan progres setengah jalan */
            height: 2px;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-cyan));
            z-index: 2;
        }
        .step-node {
            position: relative;
            z-index: 3;
            text-align: center;
            width: 33.33%;
        }
        .step-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #111827;
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px auto;
            font-size: 0.9rem;
            color: #4b5563;
            transition: all 0.3s;
        }
        .step-node.success .step-icon {
            background: rgba(5, 236, 140, 0.1);
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 15px rgba(5, 236, 140, 0.2);
        }
        .step-node.active .step-icon {
            background: rgba(0, 242, 254, 0.1);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px rgba(0, 242, 254, 0.2); }
            50% { box-shadow: 0 0 20px rgba(0, 242, 254, 0.5); }
            100% { box-shadow: 0 0 5px rgba(0, 242, 254, 0.2); }
        }

        /* Terminal Receipt Panel */
        .terminal-receipt {
            background: #040711;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 24px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.88rem;
            line-height: 1.6;
            color: #cbd5e1;
            position: relative;
        }
        .terminal-receipt::before {
            content: 'INVOICE_REPORT';
            position: absolute;
            top: -10px;
            left: 20px;
            background: #02040a;
            padding: 0 10px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #64748b;
        }

        .status-badge-waiting {
            background: rgba(255, 117, 140, 0.1);
            color: var(--neon-orange);
            border: 1px solid rgba(255, 117, 140, 0.2);
            padding: 4px 12px;
            border-radius: 8px;
            display: inline-block;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        .btn-panel-back {
            background: linear-gradient(90deg, var(--neon-cyan), #00bcff);
            color: #000;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            padding: 14px;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
        }
        .btn-panel-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.3);
            color: #000;
        }
    </style>
</head>
<body>

    <div class="ambient-blur"></div>

    <div class="container" id="main-view">
        </div>

    <script>
        const lastOrder = JSON.parse(localStorage.getItem('last_user_order'));
        const mainView = document.getElementById('main-view');

        if (!lastOrder) {
            // JIKA USER BELUM MEMILIKI TRANSAKSI SAMA SEKALI
            mainView.innerHTML = `
                <div class="notify-container text-center">
                    <div class="mb-4 text-muted"><i class="fa-solid fa-folder-open fa-4x opacity-50"></i></div>
                    <h3 class="fw-bold text-white mb-2">Tidak Ada Aktivitas Pesanan</h3>
                    <p class="text-muted small mx-auto mb-4" style="max-width: 400px;">Sistem tidak mendeteksi adanya invoice tertunda. Silahkan kunjungi store kami untuk melakukan deployment cloud server.</p>
                    <a href="dashboard.html" class="btn btn-panel-back w-100">KEMBALI KE DASHBOARD</a>
                </div>
            `;
        } else {
            // JIKA TRANSAKSI BARU SAJA BERHASIL DILAKUKAN USER
            mainView.innerHTML = `
                <div class="notify-container">
                    
                    <div class="text-center mb-4">
                        <div class="d-inline-flex p-3 rounded-circle bg-success bg-opacity-10 text-success mb-3" style="box-shadow: 0 0 30px rgba(5,236,140,0.15);">
                            <i class="fa-solid fa-envelope-circle-check fa-3x"></i>
                        </div>
                        <h2 class="fw-bold text-white mb-1">Pemesanan Sukses!</h2>
                        <p class="text-muted small">Transaksi telah tercatat dan sedang diproses oleh sistem inti.</p>
                    </div>

                    <div class="tracking-wrapper">
                        <div class="tracking-line-active"></div>
                        
                        <div class="step-node success">
                            <div class="step-icon"><i class="fa-solid fa-cart-shopping"></i></div>
                            <span class="small d-block text-muted" style="font-size:0.75rem;">Checkout</span>
                        </div>
                        <div class="step-node active">
                            <div class="step-icon"><i class="fa-solid fa-user-shield"></i></div>
                            <span class="small d-block text-white fw-bold" style="font-size:0.75rem;">Konfirmasi Admin</span>
                        </div>
                        <div class="step-node">
                            <div class="step-icon"><i class="fa-solid fa-server"></i></div>
                            <span class="small d-block text-muted" style="font-size:0.75rem;">Node Live</span>
                        </div>
                    </div>

                    <div class="p-3 rounded-3 text-center mb-4" style="background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);">
                        <div class="status-badge-waiting mb-2">
                            <i class="fa-solid fa-hourglass-half me-1 animate-spin"></i> AWAITING_ADMIN_VERIFICATION
                        </div>
                        <p class="text-muted small mb-0 px-3">Bukti transfer & data kontak tujuan Anda telah diteruskan ke akun notifikasi admin. Mohon tunggu proses setup data kredensial akun VPS Anda.</p>
                    </div>

                    <div class="terminal-receipt mb-4">
                        <div class="d-flex justify-content-between"><span style="color:#64748b;">ORDER_ID :</span> <span class="text-white fw-bold">${lastOrder.id}</span></div>
                        <div class="d-flex justify-content-between"><span style="color:#64748b;">TIMESTAMP:</span> <span>${lastOrder.time}</span></div>
                        <div class="d-flex justify-content-between"><span style="color:#64748b;">PRODUCT  :</span> <span class="text-info font-space fw-bold">${lastOrder.product}</span></div>
                        <div class="d-flex justify-content-between"><span style="color:#64748b;">GATEWAY  :</span> <span>Via ${lastOrder.media}</span></div>
                        <div class="d-flex justify-content-between"><span style="color:#64748b;">CONTACT  :</span> <span class="text-warning">${lastOrder.contact}</span></div>
                        <div class="d-flex justify-content-between"><span style="color:#64748b;">ATTACH   :</span> <span class="text-success" style="font-size:0.8rem;"><i class="fa-solid fa-file-image me-1"></i>${lastOrder.fileName}</span></div>
                        <div class="border-top border-secondary border-opacity-20 my-2"></div>
                        <div class="d-flex justify-content-between font-space"><span class="text-white fw-bold">TOTAL COST:</span> <span style="color: var(--neon-green);" class="fw-bold">IDR ${lastOrder.price.toLocaleString('id-ID')}</span></div>
                    </div>

                    <a href="dashboard.html" class="btn btn-panel-back text-center">KEMBALI KE DASHBOARD OVERVIEW</a>
                </div>
            `;
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
