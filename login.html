<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noxx Hostt - Terminal Authentication Gate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/html/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #02040a;
            --panel-glass: rgba(10, 15, 30, 0.7);
            --neon-cyan: #00f2fe;
            --neon-purple: #9d4edd;
            --blur-radius: 20px;
        }

        body {
            background-color: var(--bg-deep);
            color: #f3f4f6;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.015) 1px, transparent 1px);
            background-size: 35px 35px;
        }

        /* Ambient Glowing Background Orbs */
        .login-ambient {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.2;
            pointer-events: none;
            animation: floatGlow 8s infinite alternate;
        }
        .orb-left { background: var(--neon-purple); top: -10%; left: -10%; }
        .orb-right { background: var(--neon-cyan); bottom: -10%; right: -10%; }

        @keyframes floatGlow {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        h2, .font-space {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Advanced Cyber Authentic Card */
        .login-card {
            background: var(--panel-glass);
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 28px;
            padding: 45px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        /* Brand Title Shimmer */
        .brand-logo {
            font-size: 1.8rem;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #fff, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Form Inputs Dark Styling */
        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #64748b;
        }
        .input-group-text {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-right: none;
            color: #4b5563;
            border-radius: 12px 0 0 12px;
            padding: 0 16px;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            border-radius: 0 12px 12px 0;
            padding: 14px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
        }
        .form-control::placeholder {
            color: #374151;
        }

        /* Submit Action Button */
        .btn-cyber-login {
            background: rgba(255, 255, 255, 0.02);
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
            transition: all 0.3s;
        }
        .btn-cyber-login:hover {
            background: var(--neon-cyan);
            color: #02040a;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.35);
            transform: translateY(-2px);
        }

        .system-hint {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.75rem;
            color: #4b5563;
        }
    </style>
</head>
<body>

    <div class="login-ambient orb-left"></div>
    <div class="login-ambient orb-right"></div>

    <div class="login-card text-center">
        <div class="mb-2">
            <span class="badge bg-info bg-opacity-10 text-info border border-info border-opacity-10 font-monospace px-3 py-1.5" style="font-size: 0.65rem;">
                SECURE IDENTITY GATEWAY
            </span>
        </div>
        <h2 class="brand-logo fw-bold mb-1"><i class="fa-solid fa-terminal me-2"></i>NOXX HOSTT</h2>
        <p class="text-muted small mb-4">Cloud Node Server Deployment Infrastructure</p>
        
        <form id="loginForm" class="text-start">
            <div class="mb-3">
                <label class="form-label text-uppercase font-monospace">Identity Handle</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user-shield"></i></span>
                    <input type="text" id="username" class="form-control" placeholder="Masukkan 'admin' atau 'user'" required autocomplete="off">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label text-uppercase font-monospace">Access Password Token</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-cyber-login w-100 text-uppercase mb-4">
                <i class="fa-solid fa-shield-halved me-2"></i>Initialize Session
            </button>
        </form>

        <div class="system-hint p-2.5 text-start">
            <span class="text-white-50 d-block mb-1">// SYSTEM_ACCESS_HINT:</span>
            Untuk menguji peran Admin, gunakan input: <span class="text-info">admin</span><br>
            Untuk menguji peran User, gunakan input: <span class="text-purple" style="color:var(--neon-purple);">user</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const usernameInput = document.getElementById('username').value.trim();
        const passwordInput = document.getElementById('password').value;

        try {
            // Mengirim data ke serverless API Vercel
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: usernameInput, password: passwordInput })
            });

            const data = await response.json();

            if (response.ok) {
                if (data.status === 'registered') {
                    alert("✨ " + data.message + "\nSelamat bergabung di Noxx Hostt!");
                }
                
                // Menyimpan sesi peran di browser browser
                localStorage.setItem('role', data.role);
                localStorage.setItem('session_user', usernameInput);

                // Pengalihan halaman sesuai role dari database JSON
                if (data.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } else {
                alert("❌ Gagal Masuk: " + data.message);
            }
        } catch (error) {
            console.error("Error authentication bridge:", error);
            alert("❌ Gagal terhubung ke server database.");
        }
    });
</script>

</body>
</html>
